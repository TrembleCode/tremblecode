name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please **do not** report security issues here —
        see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a project with ...
        2. Generate plan ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Server logs, browser console, or agent terminal output. Redact secrets.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Node version, Python version, TrembleCode commit/version, Claude subscription vs API-key mode.
    validations:
      required: true
