# TrembleCode v2 infrastructure. The server and web app run on the host in dev
# (make dev); only Redis is containerized. Project sandboxes are created
# directly via the Docker API by the server.

services:
  redis:
    image: redis:7-alpine
    container_name: tremblecode-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis_data:
